<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini Auth Server{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .input-field { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(71, 85, 105, 0.5); transition: all 0.2s ease; }
        .input-field:focus { border-color: #6366f1; ring: 2px; ring-color: #6366f1/30; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        slate: {
                            850: '#151e2d',
                            950: '#0a0f18',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 antialiased flex flex-col relative">
    <!-- Decorative Gradients -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-indigo-500/15 blur-[120px]"></div>
        <div class="absolute top-[50%] -right-[5%] w-[35%] h-[35%] rounded-full bg-violet-500/10 blur-[100px]"></div>
        <div class="absolute bottom-0 left-[20%] w-[30%] h-[30%] rounded-full bg-blue-500/10 blur-[110px]"></div>
    </div>

    <!-- Navigation -->
    <nav class="w-full glass sticky top-0 z-50 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <a href="/" class="text-2xl font-bold tracking-tight text-white">Auth<span class="text-indigo-500">Node</span></a>
                </div>
                <div>
                    <div class="flex items-center space-x-6" id="nav-links">
                        <a href="/login" class="text-slate-300 hover:text-white font-medium transition-colors">Login</a>
                        <a href="/register" class="btn-primary text-white px-6 py-2.5 rounded-xl font-semibold">Get Started</a>
                    </div>

                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-8 border-t border-white/5 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Secure Auth Node Server. Built with FastAPI & SQLite.</p>
    </footer>

    {% block scripts %}
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            const navLinks = document.getElementById('nav-links');
            if(token) {
                navLinks.innerHTML = `
                    <a href="/dashboard" class="text-slate-300 hover:text-white font-medium transition-colors">Dashboard</a>
                    <button onclick="logout()" class="text-rose-400 hover:text-rose-300 transition-colors font-medium border border-rose-500/20 bg-rose-500/5 px-5 py-2 rounded-xl">Logout</button>
                `;
            }
        });

        async function logout() {
            const token = localStorage.getItem('access_token');
            if(token) {
                try {
                    await fetch('/logout', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch(e) { console.error("Logout API failed", e); }
            }
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/login';
        }

    </script>
    {% endblock %}
</body>
</html>
